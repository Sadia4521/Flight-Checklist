<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Checklist</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="page-layout">
        <header class="hero">
            <h1>Flight Checklist</h1>
            <p>Your complete pre-flight preparation guide.</p>
        </header>
        <main>
            <section class="card">
                <h2>Documents</h2>
                <div class="checklist">
                    <div class="item">✔ Passport</div>
                    <div class="item">✔ Visa</div>
                    <div class="item">✔ Boarding Pass</div>
                </div>
            </section>
            <section class="card">
                <h2>Baggage</h2>
                <div class="checklist">
                    <div class="item">✔ Carry-on Bag</div>
                    <div class="item">✔ Checked Luggage</div>
                    <div class="item">✔ Luggage Tags</div>
                </div>
            </section>
            <section class="card">
                <h2>Flight Information</h2>
                <img
                    src="/f.jpg"
                    alt="Airplane"
                    width="500"
                    height="300">
                <p>
                    Arrive at the airport at least
                    2 hours before departure.
                </p>
            </section>
        </main>
        <footer>
            <p>© 2026 Flight Checklist Website</p>
        </footer>
    </div>
</body>
</html>
